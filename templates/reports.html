<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reports</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body>
    <div class="dashboard-layout">
      <div class="sidebar">
        <div class="logo-section">
          <h2><i class="bi bi-lightning-charge-fill"></i> SmartGrid</h2>
          <p>Energy Platform</p>
        </div>

        <ul>
          <li>
            <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
          </li>

          <li>
            <a href="/analytics"><i class="bi bi-graph-up"></i> Analytics</a>
          </li>

          <li>
            <a href="/blockchain"
              ><i class="bi bi-link-45deg"></i> Blockchain</a
            >
          </li>

          <li>
            <a href="/transactions"
              ><i class="bi bi-lightning-charge"></i> Transactions</a
            >
          </li>

          <li>
            <a href="/ai-monitoring"><i class="bi bi-cpu"></i> AI Monitoring</a>
          </li>

          <li class="active">
            <a href="/reports">
              <i class="bi bi-file-earmark-text"></i>
              Reports
            </a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <div class="container-fluid p-4">
          <div class="hero-section">
            <h1>Reports Center</h1>
            <p>Executive Energy Reports</p>
          </div>

          <div class="row g-4 mt-4">
            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Total Revenue</h6>
                <h2 id="revenue">0</h2>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Energy Consumed</h6>
                <h2 id="consumed">0</h2>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Energy Generated</h6>
                <h2 id="generated">0</h2>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="metric-card">
                <h6>District Performance</h6>
                <h2 id="performance">0%</h2>
              </div>
            </div>
          </div>

          <div class="row mt-4">
            <div class="col-lg-6">
              <div class="data-panel">
                <h4>Revenue Analytics</h4>
                <canvas id="revenueChart"></canvas>
              </div>
            </div>

            <div class="col-lg-6">
              <div class="data-panel">
                <h4>Energy Analytics</h4>
                <canvas id="energyChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/reports.js"></script>
  </body>
</html>
