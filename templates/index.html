<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SmartGrid Platform</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/css/style.css" />

    <style>
      .landing-container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .landing-card {
        width: 700px;
        text-align: center;
        padding: 60px;
        border-radius: 25px;
        background: rgba(10, 20, 35, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .landing-title {
        color: #38bdf8;
        font-size: 52px;
        font-weight: 700;
      }

      .landing-subtitle {
        color: #94a3b8;
        margin-top: 15px;
        margin-bottom: 35px;
      }

      .btn-login {
        background: #38bdf8;
        border: none;
        width: 220px;
      }

      .btn-register {
        background: #22c55e;
        border: none;
        width: 220px;
      }

      .feature-box {
        margin-top: 40px;
        color: #cbd5e1;
      }
    </style>
  </head>

  <body>
    <div class="landing-container">
      <div class="landing-card">
        <h1 class="landing-title">⚡ SmartGrid Platform</h1>

        <p class="landing-subtitle">
          Blockchain Powered Smart City Energy Management System
        </p>

        <div class="d-flex justify-content-center gap-3">
          <a href="/login" class="btn btn-lg btn-login"> Login </a>

          <a href="/register" class="btn btn-lg btn-register">
            Create Account
          </a>
        </div>

        <div class="feature-box">
          <h5>Features</h5>

          <p>
            Smart Energy Monitoring • Blockchain Security • AI Analytics •
            Energy Marketplace • Smart City Management
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
