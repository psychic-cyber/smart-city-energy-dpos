<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SmartGrid</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body class="marketplace-page auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">⚡</div>
        <h2>SmartGrid Login</h2>
        <p class="auth-subtitle">Secure access to enterprise energy intelligence.</p>

        <form method="POST">
          <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required />
          </div>
          <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required />
          </div>
          <button class="btn auth-btn-primary" type="submit">Login</button>
        </form>

        <div class="auth-footer">
          New to SmartGrid?
          <a href="/register" class="auth-link">Create Account</a>
        </div>
      </div>
    </div>
  </body>
</html>
