<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SmartGrid</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body class="marketplace-page auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">⚡</div>
        <h2>SmartGrid Login</h2>
        <p class="auth-subtitle">Secure access to enterprise energy intelligence.</p>

        <form method="POST">
          <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required maxlength="100"/>
          </div>
          <div class="mb-3 password-input-wrapper">
            <input type="password" name="password" class="form-control password-input" placeholder="Password" required minlength="5" maxlength="100"/>
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility(event)">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
          <button class="btn auth-btn-primary" type="submit">Login</button>
        </form>

        <div class="auth-footer">
          New to SmartGrid?
          <a href="/register" class="auth-link">Create Account</a>
        </div>
      </div>
    </div>

    <script>
      function togglePasswordVisibility(event) {
        event.preventDefault();
        const passwordInput = event.target.closest('.password-toggle-btn').parentElement.querySelector('.password-input');
        const icon = event.target.closest('.password-toggle-btn').querySelector('i');

        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          icon.classList.remove('bi-eye-slash');
          icon.classList.add('bi-eye');
        } else {
          passwordInput.type = 'password';
          icon.classList.remove('bi-eye');
          icon.classList.add('bi-eye-slash');
        }
      }
    </script>
  </body>
</html>
