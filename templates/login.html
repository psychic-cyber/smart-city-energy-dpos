<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - SmartGrid</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/css/style.css" />

    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .auth-card {
        width: 500px;
        background: rgba(10, 20, 35, 0.92);
        padding: 50px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .logo-icon {
        font-size: 50px;
        text-align: center;
        margin-bottom: 10px;
      }

      .auth-card h2 {
        color: #38bdf8;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2.2rem;
        font-weight: 700;
      }

      .auth-subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 30px;
        font-size: 15px;
      }

      .form-control {
        background: #12243d;
        border: none;
        color: white;
        height: 52px;
        border-radius: 12px;
      }

      .form-control::placeholder {
        color: #94a3b8;
      }

      .btn-login {
        width: 100%;
        height: 52px;
        border-radius: 12px;
        font-weight: 600;
        background: #38bdf8;
        border: none;
      }

      .auth-footer {
        margin-top: 25px;
        text-align: center;
        color: rgba(255, 255, 255, 0.65);
        font-size: 14px;
      }

      .auth-link {
        color: #38bdf8;
        text-decoration: none;
        font-weight: 700;
        margin-left: 6px;
        transition: 0.3s;
      }

      .auth-link:hover {
        color: #67e8f9;
      }
    </style>
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo-icon">⚡</div>

        <h2>SmartGrid Platform</h2>

        <p class="auth-subtitle">Smart City Energy Trading Platform</p>

        <form method="POST">
          <div class="mb-3">
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="Email Address"
              required
            />
          </div>

          <div class="mb-3">
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Password"
              required
            />
          </div>

          <button class="btn btn-login" type="submit">Login</button>
        </form>

        <div class="auth-footer">
          <span>New to SmartGrid?</span>

          <a href="/register" class="auth-link"> Create Account </a>
        </div>
      </div>
    </div>
  </body>
</html>
