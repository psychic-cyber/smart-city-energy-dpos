<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Analytics</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body class="marketplace-page">
    <div class="dashboard-layout">
      <div class="sidebar">
        <div class="logo-section">
          <h2>
            <i class="bi bi-lightning-charge-fill"></i>
            SmartGrid
          </h2>

          <p>Energy Platform</p>
        </div>

        <ul>
          <li>
            <a href="/">
              <i class="bi bi-speedometer2"></i>
              Dashboard
            </a>
          </li>

          <li class="active">
            <a href="/analytics">
              <i class="bi bi-graph-up"></i>
              Analytics
            </a>
          </li>

          <li>
            <a href="/blockchain">
              <i class="bi bi-link-45deg"></i>
              Blockchain
            </a>
          </li>

          <li>
            <a href="/transactions">
              <i class="bi bi-lightning-charge"></i>
              Transactions
            </a>
          </li>

          <li>
            <a href="/ai-monitoring">
              <i class="bi bi-cpu"></i>
              AI Monitoring
            </a>
          </li>

          <li>
            <a href="/reports">
              <i class="bi bi-file-earmark-text"></i>
              Reports
            </a>
          </li>

          <li>
            <a href="/users">
              <i class="bi bi-people"></i>
              Users
            </a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <div class="marketplace-shell">
          <header class="marketplace-hero">
            <div class="marketplace-hero__icon marketplace-hero__icon--blue">
              <i class="bi bi-graph-up"></i>
            </div>
            <h1 class="marketplace-hero__title">Analytics Center</h1>
            <p class="marketplace-hero__subtitle">Smart Grid Analytics & Insights</p>
          </header>

          <section class="marketplace-section">
            <div class="row g-4 mb-4 mt-3">
              <div class="col-lg-3">
                <div class="marketplace-stat-card">
                  <div class="marketplace-stat-card__icon marketplace-stat-card__icon--blue">
                    <i class="bi bi-lightning-charge"></i>
                  </div>
                  <p class="marketplace-stat-card__label">Total Energy</p>
                  <p class="marketplace-stat-card__value" id="totalEnergy"></p>
                </div>
              </div>

            <div class="col-lg-3">
              <div class="marketplace-stat-card">
                <div class="marketplace-stat-card__icon marketplace-stat-card__icon--green">
                  <i class="bi bi-currency-dollar"></i>
                </div>
                <p class="marketplace-stat-card__label">Total Revenue</p>
                <p class="marketplace-stat-card__value" id="totalRevenue"></p>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="marketplace-stat-card">
                <div class="marketplace-stat-card__icon marketplace-stat-card__icon--cyan">
                  <i class="bi bi-speedometer2"></i>
                </div>
                <p class="marketplace-stat-card__label">Energy Utilization</p>
                <p class="marketplace-stat-card__value" id="efficiencyRate"></p>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="marketplace-stat-card">
                <div class="marketplace-stat-card__icon marketplace-stat-card__icon--amber">
                  <i class="bi bi-people"></i>
                </div>
                <p class="marketplace-stat-card__label">Registered Nodes</p>
                <p class="marketplace-stat-card__value" id="entityCount"></p>
              </div>
            </div>
          </div>
          </section>

          <section class="marketplace-section">
            <div class="row mt-4">
              <div class="col-lg-6">
                <div class="marketplace-panel">
                  <h2 class="marketplace-panel__title"><i class="bi bi-bar-chart-line"></i> Energy Consumption By Role</h2>
                  <canvas id="districtChart"></canvas>
                </div>
              </div>

            <div class="col-lg-6">
              <div class="marketplace-panel">
                <h2 class="marketplace-panel__title"><i class="bi bi-diagram-3"></i> Entity Analytics</h2>
                <canvas id="entityChart"></canvas>
              </div>
            </div>
          </div>
          </section>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="/static/js/analytics.js"></script>
  </body>
</html>
