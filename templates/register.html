<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - SmartGrid</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body class="marketplace-page auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">⚡</div>
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join the SmartGrid energy marketplace and enterprise operations.</p>

        <form method="POST">
          <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required />
          </div>
          <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required />
          </div>
          <div class="mb-3 password-input-wrapper">
            <input type="password" name="password" class="form-control password-input" placeholder="Password" required />
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility(event)">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
          <div class="mb-3">
            <select name="role" class="form-control" required>
              <option value="">Select Entity Type</option>
              <option value="House">House</option>
              <option value="Hospital">Hospital</option>
              <option value="University">University</option>
              <option value="Office">Office</option>
              <option value="Restaurant">Restaurant</option>
              <option value="Factory">Factory</option>
              <option value="SolarFarm">Solar Farm</option>
            </select>
          </div>
          <button type="submit" class="btn auth-btn-primary">Register</button>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a href="/login" class="auth-link">Sign In</a>
        </div>
      </div>
    </div>

    <script>
      function togglePasswordVisibility(event) {
        event.preventDefault();
        const passwordInput = event.target.closest('.password-toggle-btn').parentElement.querySelector('.password-input');
        const icon = event.target.closest('.password-toggle-btn').querySelector('i');

        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          icon.classList.remove('bi-eye-slash');
          icon.classList.add('bi-eye');
        } else {
          passwordInput.type = 'password';
          icon.classList.remove('bi-eye');
          icon.classList.add('bi-eye-slash');
        }
      }
    </script>
  </body>
</html>
