<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body class="marketplace-page">
    <div class="dashboard-layout">
      <div class="sidebar">
        <div class="logo-section">
          <h2>
            <i class="bi bi-lightning-charge-fill"></i>
            SmartGrid
          </h2>
          <p>Energy Platform</p>
        </div>

        <ul>
          <li>
            <a href="/">
              <i class="bi bi-speedometer2"></i>
              Dashboard
            </a>
          </li>
          <li>
            <a href="/analytics">
              <i class="bi bi-graph-up"></i>
              Analytics
            </a>
          </li>
          <li>
            <a href="/blockchain">
              <i class="bi bi-link-45deg"></i>
              Blockchain
            </a>
          </li>
          <li class="active">
            <a href="/transactions">
              <i class="bi bi-lightning-charge"></i>
              Transactions
            </a>
          </li>
          <li>
            <a href="/ai-monitoring">
              <i class="bi bi-cpu"></i>
              AI Monitoring
            </a>
          </li>
          <li>
            <a href="/reports">
              <i class="bi bi-file-earmark-text"></i>
              Reports
            </a>
          </li>
          <li>
            <a href="/users">
              <i class="bi bi-people"></i>
              Users
            </a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <div class="marketplace-shell">
          <header class="marketplace-hero">
            <div class="marketplace-hero__icon">
              <i class="bi bi-lightning-charge"></i>
            </div>
            <h1 class="marketplace-hero__title">Transaction Center</h1>
            <p class="marketplace-hero__subtitle">Operational visibility for marketplace energy trading and transaction flows.</p>
          </header>

          <section class="marketplace-section">
            <div class="marketplace-panel">
              <h2 class="marketplace-panel__title"><i class="bi bi-journal-text"></i> Recent Transactions</h2>
              <div class="transactions-scroll">
                <div class="table-responsive">
                  <table class="marketplace-table w-100">
                    <thead>
                      <tr>
                        <th>Seller</th>
                        <th>Buyer</th>
                        <th>Energy</th>
                        <th>Revenue</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody id="transactionsTable"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
    <script src="/static/js/transactions.js"></script>
  </body>
</html>
