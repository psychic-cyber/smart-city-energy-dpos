<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>User Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body>
    <div class="dashboard-layout">
      <div class="sidebar">
        <div class="logo-section">
          <h2>⚡ SmartGrid</h2>
          <p>User Portal</p>
        </div>

        <ul>
          <li class="active">
            <a href="/user-dashboard"> Dashboard </a>
          </li>

          <li>
            <a href="/logout"> Logout </a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <div class="container-fluid p-4">
          <div class="hero-section">
            <h1>Welcome, {{ username }}</h1>
            <p>Personal Energy Management Dashboard</p>
          </div>

          <div class="row mt-4">
            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Energy Balance</h6>
                <h2>0 kWh</h2>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Energy Generated</h6>
                <h2>0 kWh</h2>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Energy Consumed</h6>
                <h2>0 kWh</h2>
              </div>
            </div>

            <div class="col-lg-3">
              <div class="metric-card">
                <h6>Revenue Earned</h6>
                <h2>Rs 0</h2>
              </div>
            </div>
          </div>

          <div class="row mt-4">
            <div class="col-lg-12">
              <div class="data-panel">
                <h4>Energy Marketplace</h4>

                <p>Sell your extra energy to the Smart City Grid.</p>

                <button class="btn btn-success">Sell Energy</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
