<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body>
    <div class="dashboard-layout">
      <div class="sidebar">
        <div class="logo-section">
          <h2>⚡ SmartGrid</h2>
          <p>User Portal</p>
        </div>
        <ul>
          <li><a href="/user-dashboard">Dashboard</a></li>
          <li class="active"><a href="/marketplace">Marketplace</a></li>
          <li><a href="/logout">Logout</a></li>
        </ul>
      </div>

      <div class="main-content">
        <div class="container-fluid p-4">
          <div class="hero-section">
            <h1>Energy Marketplace</h1>
            <p>Buy the exact amount of energy you need</p>
          </div>

          <div id="marketplaceAlert" class="mt-4" aria-live="polite"></div>

          <section class="mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h3 class="mb-0">Available Energy</h3>
              <button class="btn btn-outline-light btn-sm" onclick="loadMarketplace()">
                Refresh
              </button>
            </div>
            <div id="marketplaceListings" class="row g-4"></div>
          </section>

          <section class="mt-5">
            <div class="data-panel">
              <div class="row g-4">
                <div class="col-lg-5">
                  <h4>Request Energy</h4>
                  <p class="text-secondary">
                    Can’t find a suitable listing? Tell sellers what you need.
                  </p>
                  <form id="energyRequestForm" novalidate>
                    <div class="mb-3">
                      <label for="requestedEnergy" class="form-label">Requested Energy</label>
                      <div class="input-group">
                        <input id="requestedEnergy" type="number" min="1" step="1" class="form-control" required />
                        <span class="input-group-text">kWh</span>
                      </div>
                    </div>
                    <div class="mb-3">
                      <label for="maximumPrice" class="form-label">Maximum Price per kWh (optional)</label>
                      <div class="input-group">
                        <span class="input-group-text">Rs</span>
                        <input id="maximumPrice" type="number" min="0.01" step="0.01" class="form-control" />
                      </div>
                    </div>
                    <div class="mb-3">
                      <label for="requestMessage" class="form-label">Message (optional)</label>
                      <textarea id="requestMessage" class="form-control" rows="3" maxlength="500"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Request</button>
                  </form>
                </div>

                <div class="col-lg-7">
                  <h4>Marketplace Requests</h4>
                  <div class="table-responsive">
                    <table class="table table-dark align-middle">
                      <thead>
                        <tr>
                          <th>Buyer</th>
                          <th>Energy</th>
                          <th>Max Price</th>
                          <th>Message</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody id="marketplaceRequests"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="/static/js/marketplace.js"></script>
  </body>
</html>
